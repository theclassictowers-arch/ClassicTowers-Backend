<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SmartTowerLab</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        text-align: center;
        padding: 40px 20px;
      }

      .container {
        max-width: 400px;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin: auto;
      }

      h2 {
        color: #773183;
        margin-bottom: 10px;
        font-weight: 600;
      }

      p {
        font-size: 16px;
        margin-bottom: 20px;
        line-height: 1.5;
      }

      .reset-button {
        display: inline-block;
        background-color: #773183;
        color: white;
        padding: 12px 24px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .reset-button:hover {
        background-color: #5c2468;
      }

      .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #777;
      }

      .warning {
        font-size: 12px;
        color: #999;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Reset Your Password</h2>
      <p>Hi,</p>
      <p>We received a request to reset your password. Use the OTP below to reset your password:</p>

      <div style="background-color: #f0e6f3; padding: 20px; border-radius: 8px; margin: 20px 0;">
        <span style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #773183;">${otp}</span>
      </div>

      <p class="warning">This OTP will expire in 15 minutes. If you didn't request this, please ignore this email.</p>

      <p class="footer">Best Regards, <br />TheClassicTowers</p>
    </div>
  </body>
</html>
