<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified - Smart Towers</title>
    <style>
      /* Importing Modern Tech Font */
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap");

      /* Base Styles */
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #ab47bc);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #fff;
        text-align: center;
        overflow: hidden;
        position: relative;
      }

      /* Animated Background Effect */
      body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 10%,
          transparent 70%
        );
        top: -50%;
        left: -50%;
        animation: backgroundMove 10s infinite linear;
      }

      @keyframes backgroundMove {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Subtle Circuit/Hex Pattern */
      body::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("https://www.transparenttextures.com/patterns/circuits.png");
        opacity: 0.05;
        z-index: 1;
      }

      /* Container Styling */
      .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        max-width: 420px;
        width: 90%;
        position: relative;
        z-index: 2;
        transition: transform 0.3s ease-in-out;
      }

      .container:hover {
        transform: translateY(-5px);
      }

      /* Logo Styling */
      .logo {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffd700;
      }

      /* IoT Pulse Animation */
      .iot-icon {
        width: 50px;
        height: 50px;
        margin-right: 10px;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      /* Animated WiFi Icon */
      .wifi-icon {
        width: 20px;
        height: 20px;
        margin-left: 5px;
        animation: wifiBlink 1.5s infinite ease-in-out;
      }

      @keyframes wifiBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* Main Message */
      .message {
        font-size: 16px;
        margin-bottom: 20px;
        font-weight: 300;
      }

      /* Verification Button */
      .verify-button {
        display: inline-block;
        padding: 14px 28px;
        background: #ffd700;
        color: #1e1e2f;
        font-weight: bold;
        text-decoration: none;
        border-radius: 8px;
        font-size: 16px;
        box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .verify-button:hover {
        background: #ffc107;
        box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5);
      }

      /* Glow Effect */
      .verify-button::before {
        content: "";
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        background: rgba(255, 255, 255, 0.2);
        opacity: 0;
        transform: scale(1.2);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }

      .verify-button:hover::before {
        opacity: 1;
        transform: scale(1);
      }

      /* Loading Animation when Clicking Verify */
      .verify-button:active {
        animation: loading 0.6s infinite;
      }

      @keyframes loading {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Footer */
      .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #ddd;
        font-weight: 300;
      }

      /* Mobile Optimizations */
      @media (max-width: 480px) {
        .verify-button {
          width: 100%;
          font-size: 14px;
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Logo & Title -->
      <div class="logo">
        <!-- Inline IoT Icon for Faster Load -->
        <svg
          class="iot-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M9 19V5l12-2v18l-12-2z"></path>
          <circle cx="6" cy="12" r="3"></circle>
        </svg>
        Smart Towers
        <svg
          class="wifi-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M5 12.55a11 11 0 0 1 14 0"></path>
          <path d="M8.5 16.05a6 6 0 0 1 7 0"></path>
          <path d="M12 20h.01"></path>
        </svg>
      </div>

      <!-- Main Message -->
      <p class="message">Hi,</p>
      <p class="message">
        Your email has been successfully verified! 🎉<br />Our team will get
        back to you shortly. After then you will be able to access your account.
        Thanks for choosing Smart Towers! 🏢
      </p>

      <!-- Footer -->
      <p class="footer">Best Regards,<br />SmartTowerLab Team</p>
    </div>
  </body>
</html>
