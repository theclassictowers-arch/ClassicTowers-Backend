<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification - SmartTowerLab</title>
    <style>
      /* Base Styles */
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        text-align: center;
        padding: 40px 20px;
      }

      /* Container */
      .container {
        max-width: 400px;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin: auto;
      }

      /* Heading */
      h2 {
        color: #773183;
        margin-bottom: 10px;
        font-weight: 600;
      }

      /* Message */
      p {
        font-size: 16px;
        margin-bottom: 20px;
        line-height: 1.5;
      }

      /* Verify Button */
      .verify-button {
        display: inline-block;
        background-color: #773183;
        color: white;
        padding: 12px 24px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .verify-button:hover {
        background-color: #5c2468;
      }

      /* Footer */
      .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Verify Your Email!</h2>
      <p>Hi,</p>
      <p>Welcome to SmartTowerLab! We're excited to have you on board.</p>

      <a
        href="${backendUrl}/api/v1/verify-email/${verificationToken}"
        class="verify-button"
      >
        Verify Email
      </a>

      <p class="footer">Best Regards, <br />TheClassicTowers</p>
    </div>
  </body>
</html>
